        function saveState() {
            const selectedIds = selectedCourses.filter(c => !c.isMandatory).map(c => c.id);
            const shortIds = shortlistedCourses.map(c => c.id);
            localStorage.setItem('yale_som_selected', JSON.stringify(selectedIds));
            localStorage.setItem('yale_som_shortlist', JSON.stringify(shortIds));
        }

        function loadState() {
            const savedSelected = localStorage.getItem('yale_som_selected');
            const savedShort = localStorage.getItem('yale_som_shortlist');
            if(savedSelected) {
                const ids = JSON.parse(savedSelected);
                const loadedCourses = ids.map(id => electiveCourses.find(c => c.id === id)).filter(Boolean);
                selectedCourses = [...mandatoryCourses, ...loadedCourses];
            }
            if(savedShort) {
                const ids = JSON.parse(savedShort);
                shortlistedCourses = ids.map(id => electiveCourses.find(c => c.id === id)).filter(Boolean);
            }
        }

        function resetState() {
            if(confirm("Are you sure you want to clear your planner and start over?")) {
                localStorage.removeItem('yale_som_selected');
                localStorage.removeItem('yale_som_shortlist');
                selectedCourses = [...mandatoryCourses];

            }

            const courseIndex = shortlistedCourses.findIndex(c => c.id === numId);

                const course = shortlistedCourses[courseIndex];
                if (course.conflict_msg && course.conflict_msg !== "") {
                    alert("⚠️ SCHEDULE CONFLICT ALERT\n\nCannot add this course because:\n" + course.conflict_msg);
                    return; 
                }
                shortlistedCourses.splice(courseIndex, 1);
                if (!selectedCourses.find(c => c.id === numId)) selectedCourses.push(course);
                saveState();
                renderApp();
            }
        }

        // --- DRAG AND DROP EVENTS ---
        function drag(ev, id) { ev.dataTransfer.setData("courseId", id); }
        function allowDrop(ev, zone) {
            ev.preventDefault();
            ev.currentTarget.classList.add(zone === 'sandbox' ? 'sandbox-drag-over' : 'drag-over');
        }
        function dragLeave(ev, zone) { ev.currentTarget.classList.remove(zone === 'sandbox' ? 'sandbox-drag-over' : 'drag-over'); }
        function dropSandbox(ev) {
            ev.preventDefault();
            ev.currentTarget.classList.remove('sandbox-drag-over');
            const id = ev.dataTransfer.getData("courseId");
            if(id) moveToSandbox(id);
        }
        function dropGrid(ev) {
            ev.preventDefault();
            ev.currentTarget.classList.remove('drag-over');
            const id = ev.dataTransfer.getData("courseId");
            if(id) moveToGrid(id);
        }

        // --- UTILS & HANDLERS ---
        function getCreditsCount() { return selectedCourses.reduce((sum, c) => sum + c.credits, 0); }
        function extractDays(scheduleStr) {
            let days = [];
            if (!scheduleStr || scheduleStr === 'TBD') return days;
            const tokens = scheduleStr.replace(/[^a-zA-Z]/g, ' ').split(/\s+/);
            if (tokens.includes('M')) days.push('Monday');
            if (tokens.includes('T')) days.push('Tuesday');
            if (tokens.includes('W')) days.push('Wednesday');
            if (tokens.includes('Th')) days.push('Thursday');
            if (tokens.includes('F')) days.push('Friday');
            return days;
        }
        function handleSearch(event) { 
            currentSearchQuery = event.target.value.toLowerCase(); 
            if(currentSearchQuery.length > 2) expandedThemes = new Set(Object.keys(themeIcons));
            if(currentSearchQuery.length === 0) expandedThemes = new Set();
            renderApp(); 
        }
        function handleFilterCategory(event) { filterCategory = event.target.value; renderApp(); }
        function handleFilterDay(event) { filterDay = event.target.value; renderApp(); }
        
        function downloadPlanner() {
            const plannerElement = document.getElementById('planner-export-area');
            if(!plannerElement) return;
            // Ocultar botones de cierre para la foto temporalmente
            const removeButtons = plannerElement.querySelectorAll('button');
            removeButtons.forEach(b => b.style.display = 'none');
            
            html2canvas(plannerElement, { backgroundColor: '#F4F5F7', scale: 2 }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'Yale_SOM_Fall_Planner.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
                // Restaurar botones
                removeButtons.forEach(b => b.style.display = '');
            });
        }

            return `
                <div class="flex flex-col md:flex-row md:items-center justify-between p-3 border-b border-gray-100 last:border-0 hover:bg-blue-50/30 transition-colors ${hasConflict ? 'bg-red-50/20' : ''} gap-4">
                    <div class="flex-grow">

                        </div>
                        <h4 class="font-bold text-gray-800 text-sm leading-tight">${course.title}</h4>
                        <p class="text-[11px] ${hasConflict ? 'text-red-500 font-medium' : 'text-gray-500'} mt-1 flex items-center gap-1.5"><i data-lucide="clock" class="w-3 h-3"></i> ${course.schedule === 'TBD' || !course.schedule ? 'Schedule TBD' : course.schedule}</p>

        function getCatalogHTML() {
            // Apply Search and Dropdown Filters
            const filteredCourses = electiveCourses.filter(course => {
                const searchStr = `${course.title} ${course.code} ${course.professor} ${course.category} ${course.theme}`.toLowerCase();
                const matchesSearch = searchStr.includes(currentSearchQuery);
                const matchesCat = filterCategory === 'all' || course.category === filterCategory;
                
                let matchesDay = filterDay === 'all';
                if(!matchesDay) {
                    const days = extractDays(course.schedule);
                    if(filterDay === 'TBD' && days.length === 0) matchesDay = true;
                    if(days.includes(filterDay)) matchesDay = true;
                }

                return matchesSearch && matchesCat && matchesDay;
            });

            let shortlistHTML = '';
            if (shortlistedCourses.length > 0 && currentSearchQuery === "" && filterCategory === "all" && filterDay === "all") {
                const favCards = shortlistedCourses.map(course => generateCourseCard(course, true)).join('');

                            <div class="w-8 h-8 bg-white border border-orange-200 rounded-lg flex items-center justify-center shrink-0 shadow-sm"><i data-lucide="heart" class="w-4 h-4 text-orange-500 fill-current"></i></div>
                            <h3 class="font-extrabold text-orange-900 text-sm md:text-base">My Shortlist (Favorites) <span class="text-xs text-orange-700/70 font-normal ml-1">(${shortlistedCourses.length})</span></h3>

                                    onkeyup="handleSearch(event)" value="${currentSearchQuery}">
                            </div>
                            <select id="filterCategory" onchange="handleFilterCategory(event)" class="bg-white p-3 rounded-xl shadow-sm border border-gray-200 text-sm text-gray-700 outline-none cursor-pointer">
                                <option value="all" ${filterCategory==='all'?'selected':''}>All Programs</option>
                                <option value="Elective" ${filterCategory==='Elective'?'selected':''}>Electives</option>
                                <option value="Core" ${filterCategory==='Core'?'selected':''}>Core</option>
                                <option value="EMBA" ${filterCategory==='EMBA'?'selected':''}>EMBA</option>
                                <option value="MMS" ${filterCategory==='MMS'?'selected':''}>MMS</option>

        function getPlannerHTML() {
            const daysOfWeek = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday'];
            
            const renderWeekGrid = (title, filterTerm, highlightColor) => {
                const termCourses = selectedCourses.filter(c => c.session === filterTerm || c.session === 'fall');

                termCourses.forEach(course => {
                    const days = extractDays(course.schedule);
                    if (days.length === 0) gridData['No Schedule / TBD'].push(course);
                    else days.forEach(d => { if(gridData[d]) gridData[d].push(course); });

                const colsHTML = daysOfWeek.map(day => {

                            <span class="text-[10px] font-bold text-gray-800 leading-tight block mb-1">${c.code}</span>

                            ${!c.isMandatory ? `<button onclick="moveToSandbox(${c.id})" class="md:hidden group-hover:block absolute top-1 right-1 text-gray-300 hover:text-orange-500 transition-colors" title="Move to Sandbox"><i data-lucide="x-circle" class="w-3.5 h-3.5"></i></button>` : ''}
                        </div>
                    `).join('');

                    return `
                        <div class="flex-1 min-w-[130px] bg-white rounded-xl border border-gray-200 overflow-hidden flex flex-col shadow-sm">
                            <div class="bg-gray-50 py-2 text-center border-b border-gray-200"><span class="text-[11px] font-black uppercase tracking-widest text-gray-500">${day}</span></div>
                            <div class="p-2 flex-grow bg-gray-50/30">${cardsHTML || `<div class="text-center mt-4"><span class="text-[10px] text-gray-400 italic">Free</span></div>`}</div>
                        </div>
                    `;
                }).join('');

                const tbdHTML = gridData['No Schedule / TBD'].length > 0 ? `
                    <div class="mt-4 p-3 bg-yellow-50 rounded-lg border border-yellow-200">

                        <div class="flex flex-wrap gap-2">

                                    <span><b>${c.code}</b>: ${c.title}</span>
                                    ${!c.isMandatory ? `<button onclick="moveToSandbox(${c.id})" class="text-yellow-600 hover:text-orange-500 hidden group-hover:block" title="Move to Sandbox"><i data-lucide="x-circle" class="w-3 h-3"></i></button>` : ''}
                                </div>
                            `).join('')}
                        </div>

                return `

                        <div class="flex flex-col lg:flex-row gap-2 overflow-x-auto pb-2 custom-scrollbar">${colsHTML}</div>

            };

            const generateSandboxCard = (c, isFormal) => `
                <div draggable="true" ondragstart="drag(event, ${c.id})" class="bg-white p-3 rounded-lg border-l-4 ${isFormal ? 'border-l-yale-accent border border-blue-200' : 'border-l-orange-400 border border-gray-200'} shadow-sm mb-3 cursor-grab hover:shadow-md hover:-translate-y-0.5 transition-all relative group">
                    <div class="flex justify-between items-start">
                        <div class="pr-6">

                </div>
            `;

            const scheduledSandboxCards = selectedCourses.filter(c => !c.isMandatory).map(c => generateSandboxCard(c, true)).join('');
            const unscheduledSandboxCards = shortlistedCourses.map(c => generateSandboxCard(c, false)).join('');

            return `
                <div class="px-4 md:px-10 mb-10 animate-fade-in">
                    
                    <!-- Area Header with Info and Download Button -->
                    <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
                        <div class="flex items-start md:items-center bg-blue-50 text-blue-800 p-4 rounded-xl border border-blue-100 flex-grow w-full">
                            <i data-lucide="info" class="w-5 h-5 mr-3 shrink-0 mt-0.5 md:mt-0"></i>
                            <p class="text-xs md:text-sm font-medium">You can <strong>drag and drop</strong> courses between the Sandbox and the Calendar. Click "Save Image" to export your planner.</p>
                        </div>
                        <button onclick="downloadPlanner()" class="w-full md:w-auto flex-shrink-0 bg-yale-accent text-white font-bold py-3 md:py-4 px-6 rounded-xl shadow-sm hover:bg-blue-700 transition-colors flex items-center justify-center gap-2">
                            <i data-lucide="camera" class="w-5 h-5"></i> <span>Save Image</span>
                        </button>
                    </div>

                    <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
                        
                        <!-- Sandbox Column -->
                        <div class="lg:col-span-3">
                            <div class="bg-gray-100 rounded-2xl p-4 border border-gray-200 h-full min-h-[500px] flex flex-col transition-colors duration-200" 
                                 ondrop="dropSandbox(event)" ondragover="allowDrop(event, 'sandbox')" ondragleave="dragLeave(event, 'sandbox')">
                                <h2 class="text-lg font-extrabold text-gray-900 flex items-center gap-2 mb-1">
                                    <i data-lucide="box" class="w-5 h-5 text-orange-500"></i> My Sandbox
                                </h2>
                                <p class="text-[11px] text-gray-500 mb-4 border-b border-gray-200 pb-3">All your selected & favorited courses.</p>
                                
                                <div class="flex-grow overflow-y-auto custom-scrollbar pr-1">
                                    ${unscheduledSandboxCards.length > 0 ? `
                                        <h4 class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-2 mt-1">Shortlist (Drafts)</h4>
                                        ${unscheduledSandboxCards}
                                    ` : ''}

                                    ${scheduledSandboxCards.length > 0 ? `
                                        <h4 class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-2 mt-4">Formal Selection</h4>
                                        ${scheduledSandboxCards}
                                    ` : ''}

                                    ${unscheduledSandboxCards.length === 0 && scheduledSandboxCards.length === 0 ? `
                                        <div class="flex flex-col items-center justify-center h-40 text-center opacity-60">
                                            <i data-lucide="folder-open" class="w-8 h-8 text-gray-400 mb-2"></i>
                                            <p class="text-xs text-gray-500">No courses here yet.</p>
                                        </div>
                                    ` : ''}
                                </div>
                            </div>
                        </div>

                        <!-- Grid Column (This is the area that gets exported to Image) -->
                        <div class="lg:col-span-9" ondrop="dropGrid(event)" ondragover="allowDrop(event, 'grid')" ondragleave="dragLeave(event, 'grid')">
                            <div id="planner-export-area" class="p-2 md:p-4 bg-[#F4F5F7] -m-2 md:-m-4 rounded-xl">
                                <div class="pointer-events-none absolute inset-0 z-0"></div>
                                ${renderWeekGrid("Fall 1 (First Half)", "fall-1", "bg-orange-500")}
                                ${renderWeekGrid("Fall 2 (Second Half)", "fall-2", "bg-purple-500")}
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        // --- MAIN LOOP ---
        function renderApp() {
            const app = document.getElementById('app');
            let contentHTML = activeTab === 'catalog' ? getCatalogHTML() : getPlannerHTML();
            app.innerHTML = getHeaderHTML() + getTabsHTML() + contentHTML;
            if(activeTab === 'catalog') {
                const searchInput = document.getElementById('searchInput');
                if(searchInput) { searchInput.focus(); searchInput.setSelectionRange(currentSearchQuery.length, currentSearchQuery.length); }
            }
            lucide.createIcons();
        }

        // Initialization
        loadState();
        renderApp();
    </script>
</body>
</html>
