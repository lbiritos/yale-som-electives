            {"code": "MGT 869", "title": "Global Health", "session": "fall", "schedule": "TBD", "professor": "Paintsil, Elijah", "credits": 2.0, "theme": "EMBA", "category": "EMBA", "id": 217},

            {"code": "MGT 932", "title": "Financial Markets & Macroeconomic Policy", "session": "fall", "schedule": "TBD", "professor": "Simsek, Alp", "credits": 2.0, "theme": "EMBA", "category": "EMBA", "id": 222},

            {"code": "MGT 948", "title": "Security Analysis & Valuation", "session": "fall", "schedule": "M  W 10:05 AM-11:25 AM", "professor": "Spiegel, Matthew", "credits": 4.0, "theme": "Finance & Economics", "category": "Finance", "id": 224},
            {"code": "MGT 949", "title": "Systemic-Risk Colloquium", "session": "fall", "schedule": "F 2:00 PM-3:20 PM", "professor": "Metrick, Andrew", "credits": 2.0, "theme": "MMS", "category": "MMS SR", "id": 225},
            {"code": "MGT 984", "title": "Studies in Grand Strategy II", "session": "fall", "schedule": "W 1:30 PM-3:25 PM", "professor": "Sarotte, Mary", "credits": 4.0, "theme": "Society, Law & Environment", "category": "Political Science", "id": 226}
        ];

        const themeIcons = {
            "Organizational Behavior & HR": "users", "Accounting & Operations": "calculator",
            "Entrepreneurship & PE": "rocket", "Strategy & Marketing": "target",
            "Finance & Economics": "trending-up", "Specific Industries": "building-2",
            "International": "globe", "Society, Law & Environment": "scale",
            "Technology & AI": "cpu", "Core": "star", "EMBA": "briefcase",
            "PhD": "graduation-cap", "Global Network": "network", "MMS": "award", "Others": "more-horizontal"
        };

        // --- APP STATE ---
        let activeTab = 'catalog'; 
        let selectedCourses = [...mandatoryCourses];
        let shortlistedCourses = []; 
        let expandedThemes = new Set(Object.keys(themeIcons)); 
        let currentSearchQuery = "";
        const MAX_CREDITS = 40;

        function setTab(tabName) { activeTab = tabName; renderApp(); }

        function toggleTheme(themeName) {
            if(expandedThemes.has(themeName)) expandedThemes.delete(themeName);
            else expandedThemes.add(themeName);
            renderApp();
        }

        // --- CORE ACTIONS ---
        function toggleFav(id) {
            const numId = parseInt(id);
            const index = shortlistedCourses.findIndex(c => c.id === numId);
            if (index > -1) {
                shortlistedCourses.splice(index, 1); 
            } else {
                const course = electiveCourses.find(c => c.id === numId);
                if(course && !selectedCourses.find(c => c.id === numId)) {
                    shortlistedCourses.push(course); 
                }
            }
            renderApp();
        }

        function addCourse(id) {
            const numId = parseInt(id);
            const course = electiveCourses.find(c => c.id === numId);
            if (course && !selectedCourses.find(c => c.id === numId)) {
                selectedCourses.push(course);
                shortlistedCourses = shortlistedCourses.filter(c => c.id !== numId); 
                renderApp();
            }
        }

        function removeCourse(id) {
            selectedCourses = selectedCourses.filter(c => c.id !== id || c.isMandatory);
            renderApp();
        }

        function moveToSandbox(id) {
            const numId = parseInt(id);
            const courseIndex = selectedCourses.findIndex(c => c.id === numId && !c.isMandatory);
            if (courseIndex > -1) {
                const course = selectedCourses[courseIndex];
                selectedCourses.splice(courseIndex, 1);
                if (!shortlistedCourses.find(c => c.id === numId)) shortlistedCourses.push(course);
                renderApp();
            }
        }

        function moveToGrid(id) {
            const numId = parseInt(id);
            const courseIndex = shortlistedCourses.findIndex(c => c.id === numId);
            if (courseIndex > -1) {
                const course = shortlistedCourses[courseIndex];
                shortlistedCourses.splice(courseIndex, 1);
                if (!selectedCourses.find(c => c.id === numId)) selectedCourses.push(course);
                renderApp();
            }
        }

        // --- DRAG AND DROP EVENTS ---
        function drag(ev, id) { ev.dataTransfer.setData("courseId", id); }
        function allowDrop(ev, zone) {
            ev.preventDefault();
            ev.currentTarget.classList.add(zone === 'sandbox' ? 'sandbox-drag-over' : 'drag-over');
        }
        function dragLeave(ev, zone) { ev.currentTarget.classList.remove(zone === 'sandbox' ? 'sandbox-drag-over' : 'drag-over'); }
        function dropSandbox(ev) {
            ev.preventDefault();
            ev.currentTarget.classList.remove('sandbox-drag-over');
            const id = ev.dataTransfer.getData("courseId");
            if(id) moveToSandbox(id);
        }
        function dropGrid(ev) {
            ev.preventDefault();
            ev.currentTarget.classList.remove('drag-over');
            const id = ev.dataTransfer.getData("courseId");
            if(id) moveToGrid(id);
        }

        // --- UTILS ---
        function getCreditsCount() { return selectedCourses.reduce((sum, c) => sum + c.credits, 0); }
        function extractDays(scheduleStr) {
            let days = [];
            if (!scheduleStr || scheduleStr === 'TBD') return days;
            const tokens = scheduleStr.replace(/[^a-zA-Z]/g, ' ').split(/\s+/);
            if (tokens.includes('M')) days.push('Monday');
            if (tokens.includes('T')) days.push('Tuesday');
            if (tokens.includes('W')) days.push('Wednesday');
            if (tokens.includes('Th')) days.push('Thursday');
            if (tokens.includes('F')) days.push('Friday');
            return days;
        }
        function handleSearch(event) { currentSearchQuery = event.target.value.toLowerCase(); renderApp(); }

        // --- HTML RENDERERS ---
        function getHeaderHTML() {
            return `
                <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center py-5 px-4 md:px-10 gap-3">
                    <div class="text-gray-500 font-bold tracking-widest text-sm flex items-center gap-2">
                        <span>CURRICULUM PLAN</span> <span class="text-gray-300">|</span> <span>FULL FALL SEMESTER</span>
                    </div>
                    <div class="text-2xl font-black flex items-center gap-1">
                        <span class="text-yale-blue">Yale</span><span class="text-gray-900 font-light">SOM</span>
                    </div>
                </div>
                <div class="slide-header-bar py-4 px-4 md:px-10 shadow-sm mb-6 flex flex-col md:flex-row md:items-end justify-between">
                    <div>
                        <span class="text-blue-200 text-xs font-bold tracking-widest uppercase mb-1 block">YALE SOM 2026</span>
                        <h1 class="text-3xl md:text-4xl font-extrabold text-white tracking-tight">Curriculum Planner & Sandbox</h1>
                    </div>
                    <div class="mt-2 md:mt-0 text-left md:text-right text-blue-100 flex flex-col items-end">
                        <p class="text-xs font-bold uppercase tracking-widest opacity-80 mb-1">Selected Credits</p>
                        <div class="bg-blue-900/40 px-3 py-1 rounded text-white font-black text-xl">

                        </div>
                    </div>
                </div>
            `;
        }

        function getTabsHTML() {
            const isCat = activeTab === 'catalog';
            return `
                <div class="px-4 md:px-10 mb-6">
                    <div class="flex p-1.5 bg-gray-200/60 rounded-xl w-full md:w-fit border border-gray-200 shadow-inner">
                        <button onclick="setTab('catalog')" class="flex-1 md:flex-none flex items-center justify-center gap-2 px-6 py-2.5 rounded-lg font-bold text-sm transition-all duration-200 ${isCat ? 'bg-white text-yale-blue shadow-sm' : 'text-gray-500 hover:text-gray-700'}">
                            <i data-lucide="layout-grid" class="w-4 h-4"></i> Course Catalog
                        </button>
                        <button onclick="setTab('planner')" class="flex-1 md:flex-none flex items-center justify-center gap-2 px-6 py-2.5 rounded-lg font-bold text-sm transition-all duration-200 ${!isCat ? 'bg-white text-yale-blue shadow-sm' : 'text-gray-500 hover:text-gray-700'}">
                            <i data-lucide="calendar-days" class="w-4 h-4"></i> Weekly Planner & Sandbox
                        </button>
                    </div>
                </div>
            `;
        }

        function generateCourseCard(course, isFav) {
            let badgeColor = "bg-gray-100 text-gray-500";
            if(course.category === "EMBA") badgeColor = "bg-blue-100 text-blue-800";
            if(course.category === "PhD") badgeColor = "bg-red-100 text-red-800";
            if(course.category === "Core") badgeColor = "bg-yellow-100 text-yellow-800";

            return `
                <div class="flex items-center justify-between p-3 border-b border-gray-100 last:border-0 hover:bg-blue-50/30 transition-colors">
                    <div>
                        <div class="flex flex-wrap items-center gap-2 mb-1">
                            <span class="text-[10px] font-bold px-1.5 py-0.5 rounded uppercase tracking-wide bg-gray-100 text-gray-800">${course.code}</span>
                            <span class="text-[9px] font-bold px-1.5 py-0.5 rounded uppercase tracking-wide ${badgeColor}">${course.category || 'Course'}</span>
                            <span class="text-[9px] font-bold px-1.5 py-0.5 rounded uppercase tracking-wide ${course.session.includes('fall-1') ? 'bg-orange-100 text-orange-600' : (course.session.includes('fall-2') ? 'bg-purple-100 text-purple-600' : 'bg-green-100 text-green-600')}">${course.session}</span>
                        </div>
                        <h4 class="font-bold text-gray-800 text-sm leading-tight">${course.title}</h4>
                        <p class="text-[11px] text-gray-500 mt-1 flex items-center gap-1.5"><i data-lucide="clock" class="w-3 h-3"></i> ${course.schedule === 'TBD' || !course.schedule ? 'Schedule TBD' : course.schedule}</p>
                        <p class="text-[11px] text-gray-500 flex items-center gap-1.5"><i data-lucide="user" class="w-3 h-3"></i> ${course.professor}</p>
                    </div>
                    <div class="flex items-center gap-3 ml-4 shrink-0">
                        <span class="font-black text-gray-700 text-sm w-8 text-right hidden sm:block">${course.credits} cr</span>
                        
                        <button onclick="toggleFav(${course.id})" class="p-2 rounded-full transition-colors focus:outline-none ${isFav ? 'bg-orange-100 text-orange-500' : 'bg-gray-100 text-gray-400 hover:bg-gray-200'}" title="Add/Remove from Shortlist">
                            <i data-lucide="heart" class="w-4 h-4 ${isFav ? 'fill-current' : ''}"></i>
                        </button>
                        
                        <button onclick="addCourse(${course.id})" class="text-xs bg-white border border-gray-300 hover:border-yale-accent hover:text-yale-accent px-3 py-2 rounded-md font-bold transition-colors shadow-sm">
                            + Add
                        </button>
                    </div>
                </div>
            `;
        }

        function getCatalogHTML() {
            const filteredCourses = electiveCourses.filter(course => {
                const searchStr = `${course.title} ${course.code} ${course.professor} ${course.category} ${course.theme}`.toLowerCase();
                return searchStr.includes(currentSearchQuery);
            });

            // 1. Render Shortlist Block at the top
            let shortlistHTML = '';
            if (shortlistedCourses.length > 0 && currentSearchQuery === "") {
                const favCards = shortlistedCourses.map(course => generateCourseCard(course, true)).join('');
                shortlistHTML = `
                    <div class="mb-6 bg-orange-50/50 rounded-xl shadow-sm border border-orange-200 overflow-hidden transition-all duration-200">
                        <div class="p-4 flex items-center gap-3 bg-orange-100/50 border-b border-orange-200">
                            <div class="w-8 h-8 bg-white border border-orange-200 rounded-lg flex items-center justify-center shrink-0 shadow-sm"><i data-lucide="heart" class="w-4 h-4 text-orange-500 fill-current"></i></div>
                            <h3 class="font-extrabold text-orange-900 text-sm md:text-base">My Shortlist (Favorites) <span class="text-xs text-orange-700/70 font-normal ml-1">(${shortlistedCourses.length})</span></h3>
                        </div>
                        <div class="p-2">${favCards}</div>
                    </div>
                `;
            }

            // 2. Render normal grouped catalog
            const grouped = {};
            Object.keys(themeIcons).forEach(t => grouped[t] = []);
            
            filteredCourses.forEach(course => {
                if(!selectedCourses.find(c => c.id === course.id)) {
                    if (grouped[course.theme]) grouped[course.theme].push(course);
                    else grouped['Others'].push(course);
                }
            });

            const blocksHTML = Object.keys(grouped).map(themeName => {
                const courses = grouped[themeName];
                if(courses.length === 0) return ''; 
                const isExpanded = expandedThemes.has(themeName);
                const icon = themeIcons[themeName] || "more-horizontal";

                const courseCards = courses.map(course => {
                    const isFav = shortlistedCourses.find(c => c.id === course.id);
                    return generateCourseCard(course, isFav);
                }).join('');

                return `
                    <div class="mb-4 bg-white rounded-xl shadow-sm border ${isExpanded ? 'border-blue-200 ring-1 ring-blue-50' : 'border-gray-200 hover:border-gray-300'} overflow-hidden transition-all duration-200">
                        <div class="p-4 cursor-pointer select-none flex justify-between items-center bg-gray-50/50 hover:bg-gray-50" onclick="toggleTheme('${themeName}')">
                            <div class="flex items-center gap-3">
                                <div class="w-8 h-8 bg-white border border-gray-200 rounded-lg flex items-center justify-center shrink-0 shadow-sm"><i data-lucide="${icon}" class="w-4 h-4 text-yale-blue"></i></div>
                                <h3 class="font-extrabold text-gray-900 text-sm md:text-base">${themeName} <span class="text-xs text-gray-400 font-normal ml-1">(${courses.length})</span></h3>
                            </div>
                            <i data-lucide="${isExpanded ? 'chevron-up' : 'chevron-down'}" class="w-4 h-4 ${isExpanded ? 'text-yale-blue' : 'text-gray-400'}"></i>
                        </div>
                        <div class="track-content ${isExpanded ? 'expanded' : ''} border-t border-gray-100 bg-white">
                            <div class="track-inner"><div class="p-2">${courseCards}</div></div>
                        </div>
                    </div>
                `;
            }).join('');

            const currentCredits = getCreditsCount();
            let barColor = 'bg-yale-blue';
            if (currentCredits > MAX_CREDITS) barColor = 'bg-red-500';
            else if (currentCredits === MAX_CREDITS) barColor = 'bg-green-500';

            const selectedCards = selectedCourses.map(course => `
                <div class="bg-white p-3 rounded-lg border border-gray-200 shadow-sm mb-2 flex justify-between items-center ${course.isMandatory ? 'border-l-4 border-l-gray-400' : 'border-l-4 border-l-yale-accent'}">
                    <div class="pr-2">
                        ${course.isMandatory ? `<span class="text-[9px] font-bold bg-gray-200 text-gray-600 px-1 py-0.5 rounded uppercase">CORE / MANDATORY</span>` : ''}
                        <h4 class="font-bold text-gray-800 text-xs mt-1 leading-tight">${course.code} - ${course.title}</h4>
                        <span class="text-[10px] text-gray-500 block mt-1">${course.session} | ${course.schedule === 'TBD' ? 'Schedule TBD' : course.schedule}</span>
                    </div>
                    <div class="flex flex-col items-end shrink-0 gap-1">
                        <span class="font-bold text-sm text-gray-700">${course.credits} cr</span>
                        ${!course.isMandatory ? `<button onclick="removeCourse(${course.id})" class="text-red-500 hover:text-red-700 text-[10px] font-bold uppercase tracking-wider">Remove</button>` : '<i data-lucide="lock" class="w-3 h-3 text-gray-400 mt-1"></i>'}
                    </div>
                </div>
            `).join('');

            return `
                <div class="px-4 md:px-10 mb-8 animate-fade-in grid grid-cols-1 lg:grid-cols-12 gap-6">

                        </div>
                        ${shortlistHTML}
                        ${blocksHTML || `<p class="text-center text-gray-500 mt-10">No courses found with that search criteria.</p>`}
                    </div>
                    <div class="lg:col-span-4">
                        <div class="bg-gray-100 rounded-2xl p-5 border border-gray-200 sticky top-4">
                            <h2 class="text-lg font-extrabold text-gray-900 mb-1">Formal Curriculum</h2>
                            <p class="text-xs text-gray-500 mb-4">These count towards your credit limit.</p>
                            <div class="mb-5 bg-white p-3 rounded-xl border border-gray-200 shadow-sm">
                                <div class="flex justify-between items-end mb-1 text-sm font-bold text-gray-700">
                                    <span>Progress</span><span class="${currentCredits > MAX_CREDITS ? 'text-red-500' : 'text-gray-900'}">${currentCredits} / ${MAX_CREDITS} cr</span>
                                </div>
                                <div class="w-full bg-gray-200 rounded-full h-2"><div class="${barColor} h-2 rounded-full transition-all duration-300" style="width: ${Math.min((currentCredits/MAX_CREDITS)*100, 100)}%"></div></div>
                                ${currentCredits > MAX_CREDITS ? '<p class="text-[10px] text-red-500 font-bold mt-2">⚠️ Limit exceeded</p>' : ''}
                            </div>
                            <div class="custom-scrollbar overflow-y-auto max-h-[500px] pr-1">${selectedCards}</div>
                        </div>
                    </div>
                </div>
            `;
        }

        function getPlannerHTML() {
            const daysOfWeek = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday'];
            
            const renderWeekGrid = (title, filterTerm, highlightColor) => {
                const termCourses = selectedCourses.filter(c => c.session === filterTerm || c.session === 'fall');
                const gridData = { 'Monday':[], 'Tuesday':[], 'Wednesday':[], 'Thursday':[], 'Friday':[], 'No Schedule / TBD':[] };
                
                termCourses.forEach(course => {
                    const days = extractDays(course.schedule);
                    if (days.length === 0) gridData['No Schedule / TBD'].push(course);
                    else days.forEach(d => { if(gridData[d]) gridData[d].push(course); });
                });

                const colsHTML = daysOfWeek.map(day => {
                    const cardsHTML = gridData[day].map(c => `
                        <div draggable="${!c.isMandatory}" ondragstart="drag(event, ${c.id})" class="bg-white p-2.5 rounded-lg border-l-4 ${c.isMandatory ? 'border-l-gray-400 opacity-90' : 'border-l-yale-accent cursor-grab hover:shadow-md hover:-translate-y-0.5'} transition-all shadow-sm border border-gray-100 mb-2 relative group">
                            <span class="text-[9px] block text-gray-500 font-bold mb-0.5">${c.schedule}</span>
                            <span class="text-[10px] font-bold text-gray-800 leading-tight block mb-1">${c.code}</span>
                            <p class="text-[9px] text-gray-600 line-clamp-2 leading-tight">${c.title}</p>
                            ${!c.isMandatory ? `<button onclick="moveToSandbox(${c.id})" class="md:hidden group-hover:block absolute top-1 right-1 text-gray-300 hover:text-orange-500 transition-colors" title="Move to Sandbox"><i data-lucide="x-circle" class="w-3.5 h-3.5"></i></button>` : ''}
                        </div>
                    `).join('');

                    return `
                        <div class="flex-1 min-w-[130px] bg-gray-50 rounded-xl border border-gray-200 overflow-hidden flex flex-col">
                            <div class="bg-gray-100 py-2 text-center border-b border-gray-200"><span class="text-[11px] font-black uppercase tracking-widest text-gray-500">${day}</span></div>
                            <div class="p-2 flex-grow">${cardsHTML || `<div class="text-center mt-4"><span class="text-[10px] text-gray-400 italic">Free</span></div>`}</div>
                        </div>
                    `;
                }).join('');

                const tbdHTML = gridData['No Schedule / TBD'].length > 0 ? `
                    <div class="mt-4 p-3 bg-yellow-50 rounded-lg border border-yellow-200">
                        <h4 class="text-xs font-bold text-yellow-800 mb-2 uppercase tracking-wide">📅 Formal Courses with No Schedule (TBD)</h4>
                        <div class="flex flex-wrap gap-2">
                            ${gridData['No Schedule / TBD'].map(c => `
                                <div draggable="${!c.isMandatory}" ondragstart="drag(event, ${c.id})" class="bg-white border border-yellow-300 text-yellow-900 text-[10px] px-2 py-1 rounded shadow-sm flex items-center gap-2 group ${c.isMandatory ? '' : 'cursor-grab hover:-translate-y-0.5 transition-transform'}">
                                    <span><b>${c.code}</b>: ${c.title}</span>
                                    ${!c.isMandatory ? `<button onclick="moveToSandbox(${c.id})" class="text-yellow-600 hover:text-orange-500 hidden group-hover:block" title="Move to Sandbox"><i data-lucide="x-circle" class="w-3 h-3"></i></button>` : ''}
                                </div>
                            `).join('')}
                        </div>
                    </div>
                ` : '';

                return `
                    <div class="mb-6 bg-white p-4 md:p-5 rounded-2xl shadow-sm border border-gray-200 relative overflow-hidden transition-colors duration-200">
                        <div class="absolute left-0 top-0 bottom-0 w-1.5 ${highlightColor}"></div>
                        <h3 class="text-lg font-extrabold text-gray-900 mb-4 ml-2 flex items-center gap-2"><i data-lucide="calendar" class="w-5 h-5 text-gray-400"></i> ${title}</h3>
                        <div class="flex flex-col lg:flex-row gap-2 overflow-x-auto pb-2 custom-scrollbar">${colsHTML}</div>
                        ${tbdHTML}
                    </div>
                `;
            };

            const generateSandboxCard = (c, isFormal) => `
                <div draggable="true" ondragstart="drag(event, ${c.id})" class="bg-white p-3 rounded-lg border-l-4 ${isFormal ? 'border-l-yale-accent border border-blue-200' : 'border-l-orange-400 border border-gray-200'} shadow-sm mb-3 cursor-grab hover:shadow-md hover:-translate-y-0.5 transition-all relative group">
                    <div class="flex justify-between items-start">
                        <div class="pr-6">
                            <span class="text-[9px] font-bold px-1 py-0.5 ${isFormal ? 'bg-blue-50 text-yale-accent' : 'bg-orange-50 text-orange-600'} rounded uppercase mb-1 inline-block">${c.session}</span>
                            <span class="text-[10px] font-bold text-gray-800 leading-tight block mb-0.5">${c.code}</span>
                            <p class="text-[10px] text-gray-600 leading-tight mb-1">${c.title}</p>
                            <span class="text-[9px] block text-gray-400 font-bold">${c.schedule === 'TBD' || !c.schedule ? 'Schedule TBD' : c.schedule}</span>
                        </div>
                    </div>
                    ${!isFormal ? `
                        <button onclick="moveToGrid(${c.id})" class="md:hidden group-hover:flex absolute top-1.5 right-1.5 w-6 h-6 bg-gray-100 rounded-full items-center justify-center text-gray-500 hover:text-yale-accent hover:bg-blue-50 transition-colors" title="Add to Grid">
                            <i data-lucide="plus" class="w-3.5 h-3.5"></i>
                        </button>
                        <button onclick="toggleFav(${c.id})" class="md:hidden group-hover:flex absolute bottom-1.5 right-1.5 w-6 h-6 items-center justify-center text-gray-300 hover:text-red-500 transition-colors" title="Remove from Sandbox">
                            <i data-lucide="trash-2" class="w-3.5 h-3.5"></i>
                        </button>
                    ` : `
                        <div class="absolute top-2 right-2 text-yale-accent" title="Currently Scheduled"><i data-lucide="calendar-check" class="w-4 h-4"></i></div>
                    `}
                </div>
            `;

            const scheduledSandboxCards = selectedCourses.filter(c => !c.isMandatory).map(c => generateSandboxCard(c, true)).join('');
            const unscheduledSandboxCards = shortlistedCourses.map(c => generateSandboxCard(c, false)).join('');

            return `
                <div class="px-4 md:px-10 mb-10 animate-fade-in">
                    <div class="mb-6 flex items-start md:items-center bg-blue-50 text-blue-800 p-4 rounded-xl border border-blue-100">
                        <i data-lucide="info" class="w-5 h-5 mr-3 shrink-0 mt-0.5 md:mt-0"></i>
                        <p class="text-xs md:text-sm font-medium">You can <strong>drag and drop</strong> courses between the Sandbox and the Calendar to draft your schedule. Courses marked as "fall" span the entire semester.</p>
                    </div>

                    <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
                        
                        <!-- Sandbox Column -->
                        <div class="lg:col-span-3">
                            <div class="bg-gray-100 rounded-2xl p-4 border border-gray-200 h-full min-h-[500px] flex flex-col transition-colors duration-200" 
                                 ondrop="dropSandbox(event)" ondragover="allowDrop(event, 'sandbox')" ondragleave="dragLeave(event, 'sandbox')">
                                <h2 class="text-lg font-extrabold text-gray-900 flex items-center gap-2 mb-1">
                                    <i data-lucide="box" class="w-5 h-5 text-orange-500"></i> My Sandbox
                                </h2>
                                <p class="text-[11px] text-gray-500 mb-4 border-b border-gray-200 pb-3">All your selected & favorited courses.</p>
                                
                                <div class="flex-grow overflow-y-auto custom-scrollbar pr-1">
                                    ${unscheduledSandboxCards.length > 0 ? `
                                        <h4 class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-2 mt-1">Shortlist (Drafts)</h4>
                                        ${unscheduledSandboxCards}
                                    ` : ''}

                                    ${scheduledSandboxCards.length > 0 ? `
                                        <h4 class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-2 mt-4">Formal Selection</h4>
                                        ${scheduledSandboxCards}
                                    ` : ''}

                                    ${unscheduledSandboxCards.length === 0 && scheduledSandboxCards.length === 0 ? `
                                        <div class="flex flex-col items-center justify-center h-40 text-center opacity-60">
                                            <i data-lucide="folder-open" class="w-8 h-8 text-gray-400 mb-2"></i>
                                            <p class="text-xs text-gray-500">No courses here yet.</p>
                                        </div>
                                    ` : ''}
                                </div>
                            </div>
                        </div>

                        <!-- Grid Column -->
                        <div class="lg:col-span-9" ondrop="dropGrid(event)" ondragover="allowDrop(event, 'grid')" ondragleave="dragLeave(event, 'grid')">
                            <div class="pointer-events-none absolute inset-0 z-0"></div>
                            ${renderWeekGrid("Fall 1 (First Half)", "fall-1", "bg-orange-500")}
                            ${renderWeekGrid("Fall 2 (Second Half)", "fall-2", "bg-purple-500")}
                        </div>
                    </div>
                </div>
            `;
        }

        // --- MAIN LOOP ---
        function renderApp() {
            const app = document.getElementById('app');
            let contentHTML = activeTab === 'catalog' ? getCatalogHTML() : getPlannerHTML();
            app.innerHTML = getHeaderHTML() + getTabsHTML() + contentHTML;
            if(activeTab === 'catalog') {
                const searchInput = document.getElementById('searchInput');
                if(searchInput) { searchInput.focus(); searchInput.setSelectionRange(currentSearchQuery.length, currentSearchQuery.length); }
            }
            lucide.createIcons();
        }

        renderApp();
    </script>
</body>
</html>
